<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NaviKR — Korea Travel Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIINfQUMWPPlDtcwN+7t3nUwhKnbq8N/UuI=" crossorigin="">
<style>
/* ── THEME ── */
:root {
  --accent: #FF385C;
  --accent-alpha: rgba(255,56,92,0.12);
}
[data-theme="light"], [data-theme="auto"] {
  --bg: #FFFFFF;
  --surface: #F7F7F7;
  --surface2: #EFEFEF;
  --border: #DDDDDD;
  --text: #222222;
  --text2: #717171;
  --text3: #B0B0B0;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  [data-theme="auto"] {
    --bg: #111111;
    --surface: #1C1C1E;
    --surface2: #2C2C2E;
    --border: #3A3A3C;
    --text: #F5F5F5;
    --text2: #ABABAB;
    --text3: #555555;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
}
[data-theme="dark"] {
  --bg: #111111;
  --surface: #1C1C1E;
  --surface2: #2C2C2E;
  --border: #3A3A3C;
  --text: #F5F5F5;
  --text2: #ABABAB;
  --text3: #555555;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.4);
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
}

/* ── LAYOUT ── */
.app {
  max-width: 430px;
  margin: 0 auto;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  z-index: 50;
}
.logo { font-size: clamp(20px,5vw,24px); font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 8px; }

.location-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 24px; padding: 6px 12px;
  font-size: 12px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
  max-width: 130px;
}
.location-pill:hover { border-color: var(--accent); color: var(--text); }
.location-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
.location-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.theme-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: border-color 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }

/* ── SEARCH ── */
.search-section {
  flex-shrink: 0;
  padding: 16px 20px 12px;
  background: var(--bg);
}
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 52px 14px 16px;
  font-family: inherit; font-size: 15px; color: var(--text);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,56,92,0.1); background: var(--bg); }
.search-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 38px; height: 38px; background: var(--accent);
  border: none; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;
}
.search-btn:hover { opacity: 0.88; }
.search-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; }

/* ── DESTINATION DISCOVERY ── */
.destination-block { margin-bottom: 14px; }
.destination-search-wrap { position: relative; margin-bottom: 10px; }
.destination-input {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px 52px 14px 16px;
  font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.destination-input::placeholder { color: var(--text3); font-weight: 500; }
.destination-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,56,92,0.1); background: var(--bg); }
.destination-search-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 38px; height: 38px; background: var(--text);
  border: none; border-radius: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;
}
.destination-search-btn:hover { opacity: 0.86; }
.destination-search-btn svg { width: 18px; height: 18px; stroke: var(--bg); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.destination-anchor {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  border: 1px solid var(--border); border-radius: 12px;
  padding: 10px 12px; margin-bottom: 10px; background: var(--surface);
}
.destination-anchor-label { min-width: 0; font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.destination-clear {
  flex-shrink: 0; border: none; background: transparent; color: var(--accent);
  font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
}
.destination-candidates { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.destination-candidate {
  width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 12px; cursor: pointer; font-family: inherit;
  transition: border-color 0.2s, background 0.2s;
}
.destination-candidate:hover { border-color: var(--accent); background: var(--surface); }
.destination-candidate-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 3px; }
.destination-candidate-sub { font-size: 12px; color: var(--text2); line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── FILTER CHIPS ── */
.filter-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 24px; padding: 7px 14px;
  font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── TABS ── */
.tabs {
  flex-shrink: 0;
  display: flex; border-bottom: 1.5px solid var(--border); padding: 0 20px; background: var(--bg);
}
.tab {
  flex: 1; padding: 12px 0; text-align: center;
  font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text3);
  background: none; border: none; border-bottom: 2.5px solid transparent;
  cursor: pointer; margin-bottom: -1.5px; transition: color 0.2s, border-color 0.2s;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── CONTENT ── */
.content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── EXPLORE TAB ── */
#tab-explore {
  padding: 16px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
}

/* ── MAP TAB ── */
#tab-map {
  display: none;
  position: relative;
  height: 100%;
  min-height: 0;
  background: var(--surface);
}
.map-canvas {
  width: 100%;
  height: 100%;
  min-height: 360px;
  background: var(--surface2);
}
.leaflet-container {
  font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  background: var(--surface2);
}
.map-marker {
  width: 30px;
  height: 30px;
  border-radius: 50% 50% 50% 8px;
  background: var(--accent);
  border: 2px solid #fff;
  box-shadow: 0 3px 12px rgba(0,0,0,0.28);
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
}
.map-marker span {
  transform: rotate(45deg);
  font-size: 14px;
  line-height: 1;
}
.map-marker.selected {
  background: #111;
  transform: rotate(-45deg) scale(1.12);
}
.map-cluster {
  min-width: 34px;
  height: 34px;
  padding: 0 9px;
  border-radius: 999px;
  background: var(--accent);
  border: 2px solid #fff;
  box-shadow: 0 4px 14px rgba(0,0,0,0.26);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
}
.map-status {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
  box-shadow: var(--card-shadow);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  max-width: calc(100% - 40px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.map-status.show { opacity: 1; }
.map-controls {
  position: absolute;
  right: 12px;
  top: 58px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.map-control-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  box-shadow: var(--card-shadow);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
}
.map-preview {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  z-index: 500;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 10px 32px rgba(0,0,0,0.18);
  padding: 10px;
  display: none;
  grid-template-columns: 74px minmax(0,1fr);
  gap: 12px;
  cursor: pointer;
}
.map-preview.show { display: grid; }
.map-preview-img {
  width: 74px;
  height: 74px;
  border-radius: 12px;
  background: var(--surface2);
  object-fit: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  overflow: hidden;
}
.map-preview-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.map-preview-body { min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
.map-preview-type { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
.map-preview-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.map-preview-addr { font-size: 12px; color: var(--text2); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.map-preview-meta { font-size: 12px; font-weight: 600; color: var(--text3); }

/* ── CHAT TAB ── */
#tab-chat {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.chat-wrap {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  padding: 16px 20px 0;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 12px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}
.chat-messages::-webkit-scrollbar { display: none; }

.msg { display: flex; gap: 10px; animation: msgIn 0.25s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  background: var(--surface); border: 1.5px solid var(--border);
}
.msg.ai .msg-avatar { background: var(--accent); border-color: var(--accent); }
.msg-bubble {
  max-width: 80%; padding: 12px 14px; border-radius: 16px;
  font-size: 14px; line-height: 1.6; color: var(--text);
}
.msg.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--accent); color: #fff; border-top-right-radius: 4px; }
.msg-bubble strong { font-weight: 800; }
.msg-bubble em { font-style: italic; }
.msg-bubble p { margin: 0 0 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { margin: 6px 0 8px 18px; padding: 0; }
.msg-bubble li { margin: 4px 0; }
.msg-bubble a { color: inherit; font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
.msg-bubble code {
  background: rgba(127,127,127,0.16);
  border-radius: 5px;
  padding: 1px 5px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 0.92em;
}
.msg-bubble pre {
  margin: 8px 0;
  padding: 10px;
  background: rgba(127,127,127,0.14);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow-x: auto;
}
.msg-bubble pre code { background: none; padding: 0; }
.msg-bubble blockquote {
  margin: 8px 0;
  padding: 6px 0 6px 10px;
  border-left: 3px solid var(--accent);
  color: var(--text2);
}
.msg-table-wrap { overflow-x: auto; margin: 8px 0; }
.msg-bubble table { width: 100%; border-collapse: collapse; font-size: 13px; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; vertical-align: top; }
.msg-bubble th { background: rgba(127,127,127,0.12); font-weight: 800; }
.msg-heading {
  display: block;
  margin: 10px 0 4px;
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}
.msg-heading:first-child { margin-top: 0; }

.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: typeBlink 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeBlink { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

.chat-input-wrap {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 12px 0;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
  border-top: 1px solid var(--border);
}
.chat-input {
  flex: 1; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  font-family: inherit; font-size: 14px; color: var(--text);
  outline: none; resize: none; max-height: 100px; transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text3); }
.chat-send {
  width: 46px; flex-shrink: 0; background: var(--accent);
  border: none; border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;
}
.chat-send:hover { opacity: 0.88; }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
.chat-send svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── NEARBY BTN ── */
.nearby-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px;
  background: var(--accent-alpha); border: 1.5px solid var(--accent);
  border-radius: 14px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--accent);
  cursor: pointer; margin-bottom: 16px; transition: background 0.2s;
}
.nearby-btn:hover { background: rgba(255,56,92,0.18); }

/* ── SECTION HEADER ── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--text); }
.section-count { font-size: 12px; color: var(--text3); font-weight: 500; }

/* ── CARDS ── */
.cards-grid { display: flex; flex-direction: column; gap: 16px; }
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; cursor: pointer;
  box-shadow: var(--card-shadow); transition: transform 0.2s, box-shadow 0.2s; position: relative;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
.card:active { transform: scale(0.99); }
.card-img-wrap { width: 100%; height: 190px; overflow: hidden; background: var(--surface2); position: relative; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: block; }
.card:hover .card-img-wrap img { transform: scale(1.03); }
.card-img-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 48px; background: linear-gradient(135deg, var(--surface), var(--surface2));
}
.card-type-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
  color: #fff; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px; border-radius: 6px; padding: 3px 8px;
}
.card-dist {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
  color: #fff; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 3px 8px;
}
.card-body { padding: 14px 16px 16px; }
.card-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.35; }
.card-addr { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 4px; }

/* ── SKELETON ── */
.skeleton-card {
  border-radius: 16px; height: 240px;
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.empty-icon { font-size: 44px; opacity: 0.35; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: flex-end; animation: overlayIn 0.2s ease;
}
@keyframes overlayIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--bg); border-radius: 24px 24px 0 0;
  width: 100%; max-height: 90dvh; overflow-y: auto; scrollbar-width: none;
  animation: sheetUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
.modal::-webkit-scrollbar { display: none; }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-hero { width: 100%; height: 250px; position: relative; overflow: hidden; }
.modal-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.modal-hero-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  display: flex; align-items: center; justify-content: center; font-size: 64px;
}
.modal-close {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  border: none; color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── THEME ── */
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
  } else {
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  }
})();

function toggleTheme() {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const isDark = cur === 'dark' || (cur === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('theme', next);
}

/* ── LOCATION ── */
function requestLocation() {
  if (!navigator.geolocation) {
    userLocation = { lat: 37.5665, lng: 126.9780, name: 'Seoul' };
    document.getElementById('location-text').textContent = 'Seoul, Korea';
    if (map) map.setView([userLocation.lat, userLocation.lng], Math.max(map.getZoom(), 13));
    loadNearby(); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      document.getElementById('location-text').textContent = 'Near you';
      if (map) map.setView([userLocation.lat, userLocation.lng], Math.max(map.getZoom(), 13));
      if (!destinationLocation) loadNearby();
    },
    () => {
      userLocation = { lat: 37.5512, lng: 126.9882, name: 'Namsan' };
      document.getElementById('location-text').textContent = 'Namsan, Seoul';
      if (map) map.setView([userLocation.lat, userLocation.lng], Math.max(map.getZoom(), 13));
      if (!destinationLocation) loadNearby();
    }
  );
}

/* ── DESTINATION ── */
async function searchDestination() {
  const input = document.getElementById('destination-input');
  const keyword = input.value.trim();
  if (!keyword) return;
  const searchKeywords = destinationSearchKeywords(keyword);
  const candidatesEl = document.getElementById('destination-candidates');
  candidatesEl.innerHTML = `<div class="destination-candidate"><div class="destination-candidate-title">Finding places...</div></div>`;
  try {
    destinationCandidates = await findDestinationCandidates(searchKeywords);
    renderDestinationCandidates();
    if (!destinationCandidates.length) showToast('No destination candidates found');
  } catch {
    destinationCandidates = [];
    candidatesEl.innerHTML = '';
    showToast('Destination search failed');
  }
}

async function findDestinationCandidates(keywords) {
  for (const searchKeyword of keywords) {
    const p = new URLSearchParams({ keyword: searchKeyword, numOfRows: 5 });
    const res = await fetch(`${API_BASE}/api/search?${p}`);
    if (!res.ok) throw new Error(`Destination search failed: ${res.status}`);
    const data = await res.json();
    const candidates = (data.items || []).filter(item => Number.isFinite(Number(item.mapx)) && Number.isFinite(Number(item.mapy)));
    if (candidates.length) return candidates;
  }
  return [];
}

function destinationSearchKeywords(keyword) {
  const key = keyword.toLowerCase().trim().replace(/\s+/g, ' ');
  const withoutKorea = key.replace(/\s*,?\s*(south\s+)?korea$/, '').trim();
  const compact = withoutKorea.replace(/[-_]/g, ' ').replace(/\s+/g, ' ');
  const suffixStripped = compact
    .replace(/\s+(station|stn|terminal|airport|beach|market|palace|village|street|area|district|city)$/, '')
    .trim();
  return uniqueKeywords([
    DESTINATION_ALIASES[key],
    DESTINATION_ALIASES[withoutKorea],
    DESTINATION_ALIASES[compact],
    DESTINATION_ALIASES[suffixStripped],
    keyword,
    withoutKorea !== key ? withoutKorea : '',
    compact !== withoutKorea ? compact : '',
    suffixStripped !== compact ? suffixStripped : '',
  ]);
}

function uniqueKeywords(values) {
  const seen = new Set();
  return values
    .map(v => String(v || '').trim())
    .filter(v => v && !seen.has(v.toLowerCase()) && seen.add(v.toLowerCase()))
    .slice(0, 4);
}

function renderDestinationCandidates() {
  const el = document.getElementById('destination-candidates');
  el.innerHTML = destinationCandidates.map((item, index) => {
    const emoji = TYPE_EMOJI[item.contentTypeId] || '📍';
    const sub = [item.typeName, item.address].filter(Boolean).join(' · ');
    return `<button class="destination-candidate" onclick="selectDestination(${index})">
      <div class="destination-candidate-title">${emoji} ${esc(item.title || 'Untitled place')}</div>
      <div class="destination-candidate-sub">${esc(sub || 'Korea')}</div>
    </button>`;
  }).join('');
}

function selectDestination(index) {
  const item = destinationCandidates[index];
  if (!item) return;
  destinationLocation = {
    lat: Number(item.mapy),
    lng: Number(item.mapx),
    label: item.title || 'Selected destination',

  document.getElementById('destination-input').value = destinationLocation.label;
  destinationCandidates = [];
  document.getElementById('destination-candidates').innerHTML = '';
  renderDestinationAnchor();
  loadNearby();

function renderDestinationAnchor() {

}

  document.getElementById('destination-candidates').innerHTML = '';

  loadNearby();

function useMyLocation() {

/* ── NEARBY ── */
async function loadNearby() {
  if (!destinationLocation && !userLocation) { requestLocation(); return; }
  const loc = destinationLocation || userLocation;
  showSkeletons();
  document.getElementById('results-label').textContent = destinationLocation
    ? `Near ${destinationLocation.label}`
    : 'Near your location';
  try {
    const p = new URLSearchParams({ lat: loc.lat, lng: loc.lng, radius: 3000, numOfRows: 20 });
    if (activeFilter) p.set('type', activeFilter);
    const res = await fetch(`${API_BASE}/api/nearby?${p}`);
    const data = await res.json();
    renderCards(data.items || []);
    document.getElementById('results-count').textContent = data.total ? `${data.total} found` : '';
  } catch { showError('Could not load nearby places'); }
}

/* ── SEARCH ── */
async function doSearch() {
  const keyword = document.getElementById('search-input').value.trim();
  if (!keyword) { loadNearby(); return; }
  showSkeletons();
  document.getElementById('results-label').textContent = `"${keyword}"`;
  try {
    const p = new URLSearchParams({ keyword, numOfRows: 20 });
    if (activeFilter) p.set('type', activeFilter);
    const res = await fetch(`${API_BASE}/api/search?${p}`);
    const data = await res.json();
    renderCards(data.items || []);
    document.getElementById('results-count').textContent = data.total ? `${data.total} results` : '';
  } catch { showError('Search failed'); }
}

/* ── FILTER ── */
function setFilter(el, type) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = type;
  hideMapPreview();
  if (currentTab === 'map') {
    resetMapData();
    loadMapPlaces(true);
    return;
  }
  const kw = document.getElementById('search-input').value.trim();
  if (kw) doSearch(); else loadNearby();
}

/* ── MAP ── */
function initMap() {
  if (map || !window.L) return;
  const start = userLocation || { lat: 37.5665, lng: 126.9780 };
  map = L.map('map-canvas', {
    zoomControl: false,
    attributionControl: false,
  }).setView([start.lat, start.lng], 13);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.control.attribution({ prefix: false, position: 'bottomleft' }).addTo(map);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors',
  }).addTo(map);
  mapLayer = L.layerGroup().addTo(map);
  map.on('movestart zoomstart', () => showMapStatus('Exploring...'));
  map.on('moveend zoomend', () => scheduleMapLoad());
  setTimeout(() => {
    map.invalidateSize();
    loadMapPlaces(true);
  }, 80);
}

function scheduleMapLoad() {
  clearTimeout(mapLoadTimer);
  hideMapPreview();
  renderMapMarkers(getMapSettings(map.getZoom()), false);
  mapLoadTimer = setTimeout(() => loadMapPlaces(false), 700);
}

function getMapSettings(zoom) {
  if (zoom >= 15) return { band: 'street', radius: 1800, rows: 14, grid: 0.012, maxTiles: 4, clusterPixels: 34 };
  if (zoom >= 13) return { band: 'area', radius: 3500, rows: 12, grid: 0.025, maxTiles: 4, clusterPixels: 42 };
  if (zoom >= 11) return { band: 'district', radius: 7000, rows: 10, grid: 0.06, maxTiles: 4, clusterPixels: 50 };
  if (zoom >= 9) return { band: 'region', radius: 14000, rows: 8, grid: 0.14, maxTiles: 2, clusterPixels: 58 };
  return { band: 'country', radius: 20000, rows: 6, grid: 0.24, maxTiles: 1, clusterPixels: 64, hint: 'Zoom in for more places' };
}

function resetMapData() {
  if (mapAbort) mapAbort.abort();
  mapTileCache.clear();
  mapTileRequests.clear();
  mapItems.clear();
  mapLastRequestAt = 0;
  selectedMapItem = null;
  mapLayer?.clearLayers();
}

function mapTileFor(lat, lng, settings) {
  return {
    y: Math.floor(lat / settings.grid),
    x: Math.floor(lng / settings.grid),
  };
}

function mapTileCenter(tile, settings) {
  return {
    lat: (tile.y + 0.5) * settings.grid,
    lng: (tile.x + 0.5) * settings.grid,
  };
}

function mapTileKey(tile, settings) {
  return [settings.band, tile.y, tile.x, settings.rows, activeFilter || 'all'].join(':');
}

function getVisibleMapTiles(settings) {
  const bounds = map.getBounds().pad(0.12);
  const center = map.getCenter();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const start = mapTileFor(sw.lat, sw.lng, settings);
  const end = mapTileFor(ne.lat, ne.lng, settings);
  const tiles = [];
  for (let y = start.y; y <= end.y; y++) {
    for (let x = start.x; x <= end.x; x++) {
      const tile = { x, y };
      const tileCenter = mapTileCenter(tile, settings);
      tiles.push({
        ...tile,
        key: mapTileKey(tile, settings),
        center: tileCenter,
        distance: center.distanceTo(L.latLng(tileCenter.lat, tileCenter.lng)),
      });
    }
  }
  return tiles.sort((a, b) => a.distance - b.distance).slice(0, settings.maxTiles);
}

function mapItemKey(item) {
  return item.contentId || `${Number(item.mapy).toFixed(5)}:${Number(item.mapx).toFixed(5)}:${item.title || ''}`;
}

function rememberMapItems(items) {
  const seenAt = Date.now();
  items.forEach(item => {
    if (!item.mapx || !item.mapy) return;
    mapItems.set(mapItemKey(item), { ...item, seenAt });
  });
  if (mapItems.size <= MAP_ITEM_LIMIT) return;
  [...mapItems.entries()]
    .sort((a, b) => (a[1].seenAt || 0) - (b[1].seenAt || 0))
    .slice(0, mapItems.size - MAP_ITEM_LIMIT)
    .forEach(([key]) => mapItems.delete(key));
}

function trimMapTileCache() {
  while (mapTileCache.size > MAP_TILE_CACHE_LIMIT) {
    mapTileCache.delete(mapTileCache.keys().next().value);
  }
}

function visibleMapItems() {
  const bounds = map.getBounds().pad(0.16);
  return [...mapItems.values()].filter(item => {
    const lat = Number(item.mapy);
    const lng = Number(item.mapx);
    return Number.isFinite(lat) && Number.isFinite(lng) && bounds.contains([lat, lng]);
  });
}

async function loadMapPlaces(force) {
  if (!map) return;
  const zoom = map.getZoom();
  const settings = getMapSettings(zoom);
  const tiles = getVisibleMapTiles(settings);

  if (force) tiles.forEach(tile => mapTileCache.delete(tile.key));

  tiles.forEach(tile => {
    const cached = mapTileCache.get(tile.key);
    if (cached) rememberMapItems(cached.items);
  });
  renderMapMarkers(settings, false);

  if (mapAbort) {
    mapAbort.abort();
    mapTileRequests.clear();
  }
  const missing = tiles.filter(tile => !mapTileCache.has(tile.key) && !mapTileRequests.has(tile.key));
  if (!missing.length) {
    showMapStatus(mapStatusText(settings), 1200);
    return;
  }

  const now = Date.now();
  const waitMs = Math.max(0, 1200 - (now - mapLastRequestAt));
  if (!force && waitMs) {
    clearTimeout(mapLoadTimer);
    mapLoadTimer = setTimeout(() => loadMapPlaces(false), waitMs);
    return;
  }
  mapLastRequestAt = now;

  showMapStatus(settings.hint || 'Loading this area...');
  mapAbort = new AbortController();
  const loadSeq = ++mapLoadSeq;

  try {
    const settled = await Promise.allSettled(missing.map(tile => loadMapTile(tile, settings, mapAbort.signal)));
    if (loadSeq !== mapLoadSeq) return;
    const failed = settled.some(result => result.status === 'rejected');
    renderMapMarkers(settings, true);
    if (failed) showMapStatus('Some areas could not load. Existing places kept.', 2200);
  } catch (e) {
    if (e.name !== 'AbortError') showMapStatus('Could not load this area. Existing places kept.', 2200);
  }
}

async function loadMapTile(tile, settings, signal) {
  mapTileRequests.add(tile.key);
  try {
    const p = new URLSearchParams({
      lat: tile.center.lat.toFixed(6),
      lng: tile.center.lng.toFixed(6),
      radius: settings.radius,
      numOfRows: settings.rows,
    });
    if (activeFilter) p.set('type', activeFilter);
    const res = await fetch(`${API_BASE}/api/map?${p}`, { signal });
    if (!res.ok) throw new Error(`Map request failed: ${res.status}`);
    const data = await res.json();
    const items = data.items || [];
    mapTileCache.set(tile.key, { items, time: Date.now() });
    trimMapTileCache();
    rememberMapItems(items);
  } finally {
    mapTileRequests.delete(tile.key);
  }
}

function clusterMapItems(items, settings) {
  const clusters = [];
  items.forEach(item => {
    const lat = Number(item.mapy);
    const lng = Number(item.mapx);
    const point = map.latLngToLayerPoint([lat, lng]);
    const cluster = clusters.find(c => c.point.distanceTo(point) <= settings.clusterPixels);
    if (cluster) {
      cluster.items.push(item);
      cluster.point = L.point(
        (cluster.point.x * (cluster.items.length - 1) + point.x) / cluster.items.length,
        (cluster.point.y * (cluster.items.length - 1) + point.y) / cluster.items.length
      );
      cluster.lat = (cluster.lat * (cluster.items.length - 1) + lat) / cluster.items.length;
      cluster.lng = (cluster.lng * (cluster.items.length - 1) + lng) / cluster.items.length;
    } else {
      clusters.push({ items: [item], point, lat, lng });
    }
  });
  return clusters;
}

function mapStatusText(settings) {
  const count = visibleMapItems().length;
  if (!count) return settings.hint || 'No places found here';
  return `${count} places shown${settings.hint ? ' · ' + settings.hint : ''}`;
}

function renderMapMarkers(settings = getMapSettings(map.getZoom()), announce = true) {
  const items = visibleMapItems();
  const clusters = clusterMapItems(items, settings);
  mapLayer.clearLayers();
  clusters.forEach(cluster => {
    if (cluster.items.length > 1) {
      const icon = L.divIcon({
        className: '',
        html: `<div class="map-cluster">${cluster.items.length}</div>`,
        iconSize: [40, 34],
        iconAnchor: [20, 17],
      });
      const marker = L.marker([cluster.lat, cluster.lng], { icon }).addTo(mapLayer);
      marker.on('click', () => {
        const nextZoom = Math.min(map.getZoom() + 2, 17);
        map.setView([cluster.lat, cluster.lng], nextZoom, { animate: true });
      });
      return;
    }
    const item = cluster.items[0];
    const emoji = TYPE_EMOJI[item.contentTypeId] || '📍';
    const selectedClass = selectedMapItem && mapItemKey(selectedMapItem) === mapItemKey(item) ? ' selected' : '';
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-marker${selectedClass}" data-id="${esc(item.contentId)}"><span>${emoji}</span></div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 28],
    });
    const marker = L.marker([Number(item.mapy), Number(item.mapx)], { icon }).addTo(mapLayer);
    marker.on('click', () => selectMapItem(item, marker));
  });
  if (announce) showMapStatus(mapStatusText(settings), 1600);
}

function selectMapItem(item, marker) {
  selectedMapItem = item;
  document.querySelectorAll('.map-marker').forEach(el => el.classList.remove('selected'));
  marker.getElement()?.querySelector('.map-marker')?.classList.add('selected');
  renderMapPreview(item);
}

function renderMapPreview(item) {
  const el = document.getElementById('map-preview');
  const emoji = TYPE_EMOJI[item.contentTypeId] || '📍';
  const img = item.firstImage
    ? `<img src="${esc(item.firstImage)}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentElement.textContent='${emoji}'">`
    : emoji;
  const dist = item.dist ? `${(item.dist/1000).toFixed(1)}km away` : 'Tap for details';
  el.innerHTML = `
    <div class="map-preview-img">${img}</div>
    <div class="map-preview-body">
      <div class="map-preview-type">${esc(item.typeName || '')}</div>
      <div class="map-preview-title">${esc(item.title || 'Untitled place')}</div>
      <div class="map-preview-addr">${esc(item.address || '')}</div>
      <div class="map-preview-meta">${dist}</div>
    </div>`;
  el.classList.add('show');
}

function openSelectedMapDetail() {
  if (!selectedMapItem) return;
  openDetail(selectedMapItem.contentId, selectedMapItem.contentTypeId, selectedMapItem);
}

function hideMapPreview() {
  document.getElementById('map-preview')?.classList.remove('show');
}

function showMapStatus(text, hideAfter) {
  const el = document.getElementById('map-status');
  if (!el) return;
  el.textContent = text;
  el.classList.add('show');

function centerMapOnUser() {
  if (!map) return;
  if (!userLocation) {
    requestLocation();
    return;
  }
  map.setView([userLocation.lat, userLocation.lng], Math.max(map.getZoom(), 13), { animate: true });

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderCards(items) {
  const grid = document.getElementById('cards-grid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No places found</div><div class="empty-sub">Try a different search or filter</div></div>`;
    return;
  }

    const emoji = TYPE_EMOJI[item.contentTypeId] || '📍';

      ? `<img src="${esc(item.firstImage)}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>${emoji}</div>'">`

/* ── DETAIL MODAL ── */
async function openDetail(contentId, contentTypeId, fallbackPlace = {}) {
  const overlay = document.getElementById('modal-overlay');
  const mc = document.getElementById('modal-content');
  overlay.style.display = 'flex';
  mc.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">⏳</div>Loading...</div>`;
  try {
    const res = await fetch(`${API_BASE}/api/detail?contentId=${encodeURIComponent(contentId)}&contentTypeId=${encodeURIComponent(contentTypeId)}`);
    const d = await res.json();
    const emoji = TYPE_EMOJI[d.contentTypeId] || '📍';
    const heroHtml = d.firstImage
      ? `<img src="${esc(d.firstImage)}" alt="${esc(d.title)}" onerror="this.parentElement.innerHTML='<div class=modal-hero-placeholder>${emoji}</div>'">`
      : `<div class="modal-hero-placeholder">${emoji}</div>`;
    const gallery = d.images && d.images.length > 1
      ? `<div class="img-gallery">${d.images.slice(1).map(u=>`<img class="gallery-img" src="${esc(u)}" loading="lazy">`).join('')}</div>`
      : '';
    const baseRows = [
      d.address ? infoRow('📍','Address',d.address) : '',
      d.tel     ? infoRow('📞','Phone',d.tel)       : '',
    ].filter(Boolean).join('');
    const mapTarget = {
      ...d,
      mapx: d.mapx || fallbackPlace.mapx,
      mapy: d.mapy || fallbackPlace.mapy,
      title: d.title || fallbackPlace.title,
    };

    mc.innerHTML = `
      <div class="modal-hero">
        ${heroHtml}
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-type-tag">${esc(d.typeName||'')}</div>
        <div class="modal-title">${esc(d.title||'')}</div>
        ${d.overview ? `<div class="modal-overview">${esc(d.overview)}</div>` : ''}
        ${gallery}
        ${baseRows}
        ${externalMapLinks(mapTarget)}
        ${typeInfoRows(d.typeInfo, d.contentTypeId)}
      </div>`;
  } catch {
    mc.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text3)">Failed to load details</div>`;
  }
}

function infoRow(icon, label, val) {
  return `<div class="info-row">
    <div class="info-icon">${icon}</div>
    <div><div class="info-label">${label}</div><div class="info-val">${esc(val)}</div></div>
  </div>`;
}

function externalMapLinks(d) {
  const lat = Number(d.mapy);
  const lng = Number(d.mapx);
  if (!Number.isFinite(lat) || !Number.isFinite(lng)) return '';
  const coord = encodeURIComponent(`${lat},${lng}`);
  const label = encodeURIComponent(d.title || `${lat},${lng}`);
  const links = [
    ['Google', `https://www.google.com/maps/search/?api=1&query=${coord}`],
    ['Naver', `https://map.naver.com/p/search/${label}`],
    ['Kakao', `https://map.kakao.com/link/search/${label}`],
  ];
  return `<div class="map-links">${links.map(([name, url]) =>
    `<a class="map-link" href="${esc(url)}" target="_blank" rel="noopener">${name}</a>`
  ).join('')}</div>`;
}

function typeInfoRows(ti, typeId) {
  if (!ti) return '';
  const tid = String(typeId), rows = [];
  if (tid==='39') {
    if (ti.firstmenu) rows.push(['🍽️','Menu',ti.firstmenu]);
    if (ti.usetime)   rows.push(['⏰','Hours',ti.usetime]);
    if (ti.restdate)  rows.push(['📅','Closed',ti.restdate]);
    if (ti.seat)      rows.push(['💺','Seats',ti.seat]);
    if (ti.takeout)   rows.push(['🛍️','Takeout',ti.takeout]);
  } else if (tid==='32') {
    if (ti.checkintime)  rows.push(['🔑','Check-in',ti.checkintime]);
    if (ti.checkouttime) rows.push(['🔓','Check-out',ti.checkouttime]);
    if (ti.breakfast)    rows.push(['🍳','Breakfast',ti.breakfast]);
    if (ti.parking)      rows.push(['🚗','Parking',ti.parking]);
  } else if (tid==='12') {
    if (ti.usetime)  rows.push(['⏰','Hours',ti.usetime]);
    if (ti.restdate) rows.push(['📅','Closed',ti.restdate]);
    if (ti.parking)  rows.push(['🚗','Parking',ti.parking]);
    if (ti.chkpet)   rows.push(['🐾','Pets',ti.chkpet]);
  } else if (tid==='14') {
    if (ti.usetime)  rows.push(['⏰','Hours',ti.usetime]);
    if (ti.restdate) rows.push(['📅','Closed',ti.restdate]);
    if (ti.usefee)   rows.push(['💰','Admission',ti.usefee]);
    if (ti.parking)  rows.push(['🚗','Parking',ti.parking]);
  } else if (tid==='15') {
    if (ti.eventstartdate) rows.push(['📅','Start',ti.eventstartdate]);
    if (ti.eventenddate)   rows.push(['📅','End',ti.eventenddate]);
    if (ti.eventplace)     rows.push(['📍','Venue',ti.eventplace]);
    if (ti.usetime)        rows.push(['⏰','Hours',ti.usetime]);
    if (ti.program)        rows.push(['🎪','Program',ti.program]);
  } else if (tid==='38') {
    if (ti.usetime)  rows.push(['⏰','Hours',ti.usetime]);
    if (ti.restdate) rows.push(['📅','Closed',ti.restdate]);
    if (ti.saleitem) rows.push(['🛍️','Items',ti.saleitem]);
    if (ti.parking)  rows.push(['🚗','Parking',ti.parking]);
  }
  return rows.map(([icon,label,val]) => infoRow(icon,label,val)).join('');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').style.display = 'none';
}

/* ── CHAT ── */
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true; addTyping();
  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, location: userLocation }),
    });
    const data = await res.json().catch(() => ({}));
    removeTyping();
    if (!res.ok || !data.reply) {
      addMsg('ai', chatErrorMessage(data));
      return;
    }
    const reply = data.reply;
    addMsg('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch {
    removeTyping();
    addMsg('ai', 'Connection error. Please try again.');
  }
  btn.disabled = false;
}

function chatErrorMessage(data) {
  const code = data?.code || '';
  if (code === 'ai_not_configured') {
    return 'AI Guide is not configured yet. Please try again later.';
  }
  if (code === 'ai_invalid_key' || code === 'ai_forbidden') {
    return 'AI Guide cannot access the AI service right now. Please try again later.';
  }
  if (code === 'ai_quota_exceeded') {
    return 'AI Guide has reached its Gemini quota or rate limit. Please try again later.';
  }
  if (code === 'ai_model_unavailable') {
    return 'AI Guide model is unavailable right now. Please try again later.';
  }
  return 'AI Guide is temporarily unavailable. Please try again later.';
}

function addMsg(role, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = role === 'ai' ? renderChatMarkdown(text) : esc(text).replace(/\n/g, '<br>');
  div.appendChild(avatar); div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function renderChatMarkdown(text) {
  const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
  const html = [];
  let listTag = '';
  let inCodeBlock = false;
  let codeLines = [];
  const closeList = () => {
    if (!listTag) return;
    html.push(`</${listTag}>`);
    listTag = '';
  };
  const addListItem = (tag, content) => {
    if (listTag !== tag) {
      closeList();
      html.push(`<${tag}>`);
      listTag = tag;
    }
    html.push(`<li>${renderInlineMarkdown(content)}</li>`);
  };
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (/^\s*```/.test(line)) {
      if (inCodeBlock) {
        html.push(`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`);
        inCodeBlock = false;
        codeLines = [];
      } else {
        closeList();
        inCodeBlock = true;
      }
      continue;
    }
    if (inCodeBlock) {
      codeLines.push(line);
      continue;
    }
    if (isMarkdownTableStart(lines, i)) {
      closeList();
      const table = collectMarkdownTable(lines, i);
      html.push(renderMarkdownTable(table.rows));
      i = table.endIndex;
      continue;
    }
    const heading = line.match(/^\s{0,3}#{1,6}\s+(.+)$/);
    if (heading) {
      closeList();
      html.push(`<span class="msg-heading">${renderInlineMarkdown(heading[1])}</span>`);
      continue;
    }
    const quote = line.match(/^\s{0,3}>\s?(.+)$/);
    if (quote) {
      closeList();
      html.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
      continue;
    }
    const numbered = line.match(/^\s*\d+[.)]\s+(.+)$/);
    if (numbered) {
      addListItem('ol', numbered[1]);
      continue;
    }
    const bullet = line.match(/^\s*[-*]\s+(.+)$/);
    if (bullet) {
      addListItem('ul', bullet[1]);
      continue;
    }
    closeList();
    if (line.trim()) html.push(`<p>${renderInlineMarkdown(line)}</p>`);
  }
  closeList();
  if (inCodeBlock) html.push(`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`);
  return html.join('');
}

function renderInlineMarkdown(text) {
  const codeSpans = [];
  const withCodeTokens = String(text || '').replace(/`([^`]+)`/g, (_, code) => {
    const token = `@@CODE${codeSpans.length}@@`;
    codeSpans.push(`<code>${esc(code)}</code>`);
    return token;
  });
  let html = esc(withCodeTokens)
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
  codeSpans.forEach((code, index) => {
    html = html.replace(`@@CODE${index}@@`, code);
  });
  return html;
}

function isMarkdownTableStart(lines, index) {
  return isTableRow(lines[index]) && isTableDivider(lines[index + 1] || '');
}

function isTableRow(line) {
  return String(line || '').includes('|') && String(line || '').trim().replace(/^\||\|$/g, '').includes('|');
}

function isTableDivider(line) {
  return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(String(line || ''));
}

function collectMarkdownTable(lines, startIndex) {
  const rows = [lines[startIndex]];
  let i = startIndex + 2;
  while (i < lines.length && isTableRow(lines[i])) {
    rows.push(lines[i]);
    i++;
  }
  return { rows, endIndex: i - 1 };
}

function renderMarkdownTable(rows) {
  const cells = row => row.trim().replace(/^\||\|$/g, '').split('|').map(cell => cell.trim());
  const [header, ...body] = rows.map(cells);
  return `<div class="msg-table-wrap"><table>
    <thead><tr>${header.map(cell => `<th>${renderInlineMarkdown(cell)}</th>`).join('')}</tr></thead>
    <tbody>${body.map(row => `<tr>${row.map(cell => `<td>${renderInlineMarkdown(cell)}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function addTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator'; div.className = 'msg ai';
  div.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="msg-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing-indicator')?.remove(); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

/* ── TABS ── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const content = document.getElementById('content');
  if (tab === 'chat') {
    document.getElementById('tab-explore').style.display = 'none';
    document.getElementById('tab-map').style.display = 'none';
    document.getElementById('tab-chat').style.display = 'flex';
    content.style.overflow = 'hidden';
    document.getElementById('chat-messages').scrollTop = 99999;
  } else if (tab === 'map') {
    document.getElementById('tab-explore').style.display = 'none';
    document.getElementById('tab-map').style.display = 'block';
    document.getElementById('tab-chat').style.display = 'none';
    content.style.overflow = 'hidden';
    initMap();
    setTimeout(() => map?.invalidateSize(), 60);
  } else {
    document.getElementById('tab-explore').style.display = '';
    document.getElementById('tab-map').style.display = 'none';
    document.getElementById('tab-chat').style.display = 'none';
    content.style.overflow = 'auto';
  }
}

/* ── HELPERS ── */
function showSkeletons() {
  document.getElementById('cards-grid').innerHTML = '<div class="skeleton-card"></div>'.repeat(3);
  document.getElementById('results-count').textContent = '';
}
function showError(msg) {
  document.getElementById('cards-grid').innerHTML =
    `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">${msg}</div></div>`;
}
function showToast(msg) {
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
}

requestLocation();
</script>
